<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rafeeq - رفيق</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" id="theme-color" content="#2196F3">
</head>
<body class="theme-light" data-page="home">
    <!-- شاشة التحميل -->
    <div class="splash-screen" id="splash">
        <div class="splash-content">
            <div class="app-icon">🛡️</div>
            <h1>رفيق</h1>
            <p>رفيقك الآمن في كل رحلة</p>
            <div class="spinner"></div>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="app-container" id="app" style="display: none;">
        <!-- الهيدر -->
        <header class="app-header">
            <div class="header-left">
                <button class="icon-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
            </div>
            <div class="header-title">
                <h1 data-i18n="app_name">رفيق</h1>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="notificationsBtn"><i class="fas fa-bell"></i></button>
            </div>
        </header>

        <!-- المحتوى الرئيسي -->
        <main class="app-content" id="mainContent">
            <!-- الصفحة الرئيسية -->
            <div class="page home-page active">
                <!-- قصص -->
                <div class="stories-section">
                    <div class="stories-container" id="storiesContainer"></div>
                </div>

                <!-- منشورات الرحلات -->
                <div class="posts-section">
                    <div class="posts-container" id="postsContainer">
                        <div class="post-card">
                            <div class="post-header">
                                <img src="https://ui-avatars.com/api/?name=أحمد&background=2196F3&color=fff" class="post-avatar">
                                <div class="post-user">
                                    <h4>أحمد</h4>
                                    <span class="post-time">منذ ساعتين</span>
                                </div>
                                <button class="post-menu"><i class="fas fa-ellipsis-v"></i></button>
                            </div>
                            <div class="post-content">
                                <div class="post-location">
                                    <i class="fas fa-map-marker-alt"></i>
                                    <span>بغداد - أربيل</span>
                                </div>
                                <div class="post-map-placeholder">
                                    <i class="fas fa-map"></i>
                                    <span data-i18n="location_sharing">مشاركة الموقع</span>
                                </div>
                            </div>
                            <div class="post-actions">
                                <button class="post-action"><i class="far fa-heart"></i> 24</button>
                                <button class="post-action"><i class="far fa-comment"></i> 5</button>
                                <button class="post-action"><i class="far fa-share-square"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- صفحة الدردشة -->
            <div class="page chat-page">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="friendSearch" placeholder="البحث عن أصدقاء..." data-i18n-placeholder="search_friends">
                </div>
                
                <div class="chats-list" id="chatsList">
                    <div class="chat-item">
                        <img src="https://ui-avatars.com/api/?name=محمد&background=4CAF50&color=fff" class="chat-avatar">
                        <div class="chat-info">
                            <h4>محمد</h4>
                            <p>مرحباً! كيف حالك؟</p>
                        </div>
                        <span class="chat-time">10:30</span>
                    </div>
                </div>
            </div>

            <!-- صفحة الملف الشخصي -->
            <div class="page profile-page">
                <div class="profile-header">
                    <div class="profile-cover">
                        <button class="edit-cover-btn"><i class="fas fa-camera"></i></button>
                    </div>
                    <div class="profile-avatar-wrapper">
                        <img src="" id="profileAvatar" class="profile-avatar" alt="Profile">
                        <button class="edit-avatar-btn"><i class="fas fa-camera"></i></button>
                    </div>
                    <h2 id="profileName"></h2>
                    <p class="profile-bio" id="profileBio"></p>
                    
                    <!-- إحصائيات قابلة للضغط -->
                    <div class="profile-stats">
                        <div class="stat-item" onclick="showUserTrips()">
                            <span class="stat-value" id="tripsCount">0</span>
                            <span data-i18n="trips">رحلات</span>
                        </div>
                        <div class="stat-item" onclick="showUserFollowers()">
                            <span class="stat-value" id="followersCount">0</span>
                            <span data-i18n="followers">متابعون</span>
                        </div>
                        <div class="stat-item" onclick="showUserFollowing()">
                            <span class="stat-value" id="followingCount">0</span>
                            <span data-i18n="following">يتابع</span>
                        </div>
                    </div>

                    <div class="profile-id-box">
                        <span class="id-label" data-i18n="your_id">معرفك</span>
                        <div class="id-value">
                            <span id="shareableId"></span>
                            <button class="copy-btn" onclick="copyId()"><i class="far fa-copy"></i></button>
                        </div>
                    </div>
                </div>

                <!-- قوائم (تظهر عند الضغط) -->
                <div class="profile-lists">
                    <div class="list-container" id="tripsList" style="display: none;">
                        <h3 data-i18n="trips">الرحلات</h3>
                        <div class="trips-grid"></div>
                    </div>
                    
                    <div class="list-container" id="followersList" style="display: none;">
                        <h3 data-i18n="followers">المتابعون</h3>
                        <div class="users-list"></div>
                    </div>
                    
                    <div class="list-container" id="followingList" style="display: none;">
                        <h3 data-i18n="following">يتابع</h3>
                        <div class="users-list"></div>
                    </div>
                </div>
            </div>

            <!-- صفحة الإعدادات -->
            <div class="page settings-page">
                <div class="settings-list">
                    <div class="settings-item">
                        <div class="settings-item-left">
                            <i class="fas fa-palette"></i>
                            <span data-i18n="theme">المظهر</span>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="themeToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    
                    <div class="settings-item" onclick="openLanguageModal()">
                        <div class="settings-item-left">
                            <i class="fas fa-globe"></i>
                            <span data-i18n="language">اللغة</span>
                        </div>
                        <i class="fas fa-chevron-left"></i>
                    </div>
                </div>
            </div>
        </main>

        <!-- شريط التنقل السفلي -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-page="home">
                <i class="fas fa-home"></i>
                <span data-i18n="home">الرئيسية</span>
            </button>
            <button class="nav-item" data-page="chat">
                <i class="fas fa-comment"></i>
                <span data-i18n="chat">الدردشة</span>
            </button>
            <button class="nav-item" data-page="profile">
                <i class="fas fa-user"></i>
                <span data-i18n="profile">الملف</span>
            </button>
            <button class="nav-item" data-page="settings">
                <i class="fas fa-cog"></i>
                <span data-i18n="settings">الإعدادات</span>
            </button>
        </nav>

        <!-- قائمة جانبية -->
        <div class="side-menu" id="sideMenu">
            <div class="menu-header">
                <img src="" id="menuAvatar" alt="">
                <h3 id="menuName"></h3>
            </div>
            <div class="menu-items">
                <a href="#" data-page="home"><i class="fas fa-home"></i> <span data-i18n="home">الرئيسية</span></a>
                <a href="#" data-page="profile"><i class="fas fa-user"></i> <span data-i18n="profile">الملف الشخصي</span></a>
                <a href="#" data-page="chat"><i class="fas fa-comment"></i> <span data-i18n="chat">الدردشة</span></a>
                <a href="#" data-page="settings"><i class="fas fa-cog"></i> <span data-i18n="settings">الإعدادات</span></a>
                <hr>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> <span data-i18n="logout">تسجيل الخروج</span></a>
            </div>
        </div>
    </div>

    <!-- نافذة تغيير اللغة -->
    <div class="modal" id="languageModal">
        <div class="modal-content">
            <h3 data-i18n="select_language">اختر اللغة</h3>
            <div class="language-options">
                <button class="language-option" onclick="changeLanguage('ar')">
                    <span class="flag">🇮🇶</span>
                    <span data-i18n="arabic">العربية</span>
                </button>
                <button class="language-option" onclick="changeLanguage('en')">
                    <span class="flag">🇬🇧</span>
                    <span data-i18n="english">English</span>
                </button>
            </div>
            <button class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <!-- نافذة البحث عن الأصدقاء -->
    <div class="modal" id="searchModal">
        <div class="modal-content">
            <h3 data-i18n="search_friends">البحث عن أصدقاء</h3>
            <div class="search-input">
                <input type="text" id="searchInput" placeholder="أدخل معرف الصديق (10 أرقام)" maxlength="10">
                <button onclick="searchFriend()"><i class="fas fa-search"></i></button>
            </div>
            <div class="search-results" id="searchResults"></div>
            <button class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js"></script>
    
    <!-- ملفات JavaScript -->
    <script src="js/firebase.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    
    <!-- كود التأكد من إخفاء شاشة التحميل -->
    <script>
    window.addEventListener('load', function() {
        setTimeout(function() {
            var splash = document.getElementById('splash');
            var app = document.getElementById('app');
            if (splash && !splash.classList.contains('hide')) {
                splash.classList.add('hide');
                setTimeout(function() {
                    splash.style.display = 'none';
                    if (app) app.style.display = 'flex';
                }, 500);
            }
        }, 3000);
    });
    
    window.onerror = function(msg, url, line) {
        console.log('خطأ في الموقع:', msg, 'السطر:', line);
        return false;
    };
    </script>
</body>
</html>
