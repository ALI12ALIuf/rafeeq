<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rafeeq - رفيق</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" id="theme-color" content="#2196F3">
</head>
<body class="theme-light" data-page="home">
    <div class="splash-screen" id="splash">
        <div class="splash-content"><div class="app-icon">🛡️</div><h1>رفيق</h1><p>رفيقك الآمن في كل رحلة</p><div class="spinner"></div></div>
    </div>

    <div class="app-container" id="app" style="display: none;">
        <header class="app-header">
            <div class="header-left"></div>
            <div class="header-title"><h1 data-i18n="app_name">رفيق</h1></div>
            <div class="header-right"></div>
        </header>

        <main class="app-content" id="mainContent">
            <div class="page home-page active">
                <div class="posts-section"><div class="posts-container" id="postsContainer"><div class="post-card"><div class="post-header"><div class="post-avatar-emoji">👤</div><div class="post-user"><h4>أحمد</h4><span class="post-time">منذ ساعتين</span></div></div><div class="post-content"><div class="post-location"><i class="fas fa-map-marker-alt"></i><span>بغداد - أربيل</span></div><div class="post-map-placeholder"><i class="fas fa-map"></i><span>مشاركة الموقع</span></div></div><div class="post-actions"><button class="post-action"><i class="far fa-heart"></i> 24</button><button class="post-action"><i class="far fa-comment"></i> 5</button></div></div></div></div>
            </div>

            <div class="page chat-page">
                <div class="search-box"><i class="fas fa-search" onclick="performSearch()" style="cursor:pointer;"></i><input type="text" id="searchInput" placeholder="البحث عن الأصدقاء"></div>
                <div id="searchResultsContainer" style="display:none;"></div>
                <div class="chats-list" id="chatsList"></div>
            </div>

            <div class="conversation-page" id="conversationPage" style="display:none;">
                <div class="conversation-header">
                    <button class="back-btn" onclick="closeConversation()"><i class="fas fa-arrow-right"></i></button>
                    <div class="conversation-user-info">
                        <div class="conversation-avatar-emoji" id="conversationAvatar">👤</div>
                        <div class="conversation-user-details"><h3 id="conversationName"></h3></div>
                    </div>
                </div>
                <div class="messages-container" id="messagesContainer"></div>
                <div class="message-input-container">
                    <div class="message-input-wrapper">
                        <button class="attach-btn" onclick="showAttachmentMenu()"><i class="fas fa-plus"></i></button>
                        <div class="input-area"><input type="text" id="messageInput" placeholder="اكتب رسالتك..." onkeypress="handleMessageKeyPress(event)" autocomplete="off"><button class="emoji-btn" onclick="showEmojiPicker()"><i class="far fa-smile"></i></button></div>
                        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                        <button class="voice-btn" style="display:none;"><i class="fas fa-microphone"></i></button>
                    </div>
                    <div class="attachment-menu" id="attachmentMenu" style="display:none;">
                        <button onclick="sendImage()"><i class="fas fa-image"></i> صورة</button>
                        <button onclick="sendVideo()"><i class="fas fa-video"></i> فيديو</button>
                        <button onclick="sendFile()"><i class="fas fa-file"></i> ملف</button>
                        <button onclick="sendVoiceNote()"><i class="fas fa-microphone"></i> بصمة صوت</button>
                        <button onclick="shareLocation()"><i class="fas fa-map-marker-alt"></i> موقع</button>
                    </div>
                    <div class="emoji-picker" id="emojiPicker" style="display:none;"><div class="emoji-grid"></div></div>
                </div>
            </div>

            <div class="page profile-page">
                <div class="profile-header">
                    <div class="profile-cover"><div class="profile-avatar-center"><div class="profile-avatar-emoji" id="profileAvatarEmoji">👤</div></div><button class="edit-profile-btn-left" onclick="openEditProfileModal()"><i class="fas fa-pen"></i></button></div>
                    <div class="profile-info-container"><div class="profile-name-wrapper"><h2 id="profileName"></h2></div><div class="profile-id-row"><button class="copy-btn-left" onclick="copyId()"><i class="far fa-copy"></i></button><span id="shareableId" class="id-value-numbers"></span><span class="id-label-english">ID</span></div></div>
                    <p class="profile-bio" id="profileBio"></p>
                    <div class="profile-stats">
                        <a href="#" class="stat-link" onclick="showUserTrips()"><span class="stat-value" id="tripsCount">0</span><span>رحلات</span></a>
                        <a href="#" class="stat-link" onclick="showFriendsList()"><span class="stat-value" id="friendsCount">0</span><span>الأصدقاء</span></a>
                        <a href="#" class="stat-link" onclick="showFriendRequests()"><span class="stat-value" id="friendRequestsCount">0</span><span>الطلبات</span></a>
                    </div>
                </div>
            </div>

            <div class="page settings-page">
                <div class="settings-list">
                    <div class="settings-item"><div class="settings-item-left"><i class="fas fa-palette"></i><span>المظهر</span></div><label class="switch"><input type="checkbox" id="themeToggle"><span class="slider"></span></label></div>
                    <div class="settings-item" onclick="openLanguageModal()"><div class="settings-item-left"><i class="fas fa-globe"></i><span>اللغة</span></div><i class="fas fa-chevron-left"></i></div>
                    <div class="settings-item" onclick="logout()"><div class="settings-item-left"><i class="fas fa-sign-out-alt" style="color:var(--danger);"></i><span style="color:var(--danger);">تسجيل الخروج</span></div></div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" data-page="home"><i class="fas fa-home"></i><span>الرئيسية</span></button>
            <button class="nav-item" data-page="chat"><i class="fas fa-comment"></i><span>الدردشة</span></button>
            <button class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>الملف</span></button>
            <button class="nav-item" data-page="settings"><i class="fas fa-cog"></i><span>الإعدادات</span></button>
        </nav>
    </div>

    <div class="modal" id="editProfileModal"><div class="modal-content"><h3>تعديل الملف الشخصي</h3><div class="edit-field"><label>الاسم</label><div class="input-wrapper"><input type="text" id="editName" maxlength="25"><span class="char-counter" id="charCounter">0/25</span></div></div><div class="edit-field"><label>صورتك الرمزية</label><div class="current-avatar" id="currentAvatarEmoji">👤</div><button class="change-avatar-btn" onclick="openAvatarModal()"><i class="fas fa-smile"></i> تغيير</button></div><div class="modal-actions"><button class="modal-btn modal-btn-outline" onclick="closeModal()">إلغاء</button><button class="modal-btn modal-btn-outline" onclick="saveProfile()">حفظ</button></div></div></div>
    <div class="modal" id="avatarModal"><div class="modal-content"><h3>اختر صورتك الرمزية</h3><div class="avatar-options"><button class="avatar-option" onclick="selectAvatar('male')"><span>👨</span> رجل</button><button class="avatar-option" onclick="selectAvatar('female')"><span>👩</span> امرأة</button><button class="avatar-option" onclick="selectAvatar('boy')"><span>🧒</span> ولد</button><button class="avatar-option" onclick="selectAvatar('girl')"><span>👧</span> بنت</button><button class="avatar-option" onclick="selectAvatar('father')"><span>👨‍🦳</span> أب</button><button class="avatar-option" onclick="selectAvatar('mother')"><span>👩‍🦳</span> أم</button><button class="avatar-option" onclick="selectAvatar('grandfather')"><span>👴</span> جد</button><button class="avatar-option" onclick="selectAvatar('grandmother')"><span>👵</span> جدة</button></div></div></div>
    <div class="modal" id="languageModal"><div class="modal-content"><h3>اختر اللغة</h3><div class="language-options"><button class="language-option" onclick="changeLanguage('ar')"><span>🇮🇶</span> العربية</button><button class="language-option" onclick="changeLanguage('en')"><span>🇬🇧</span> English</button></div></div></div>

    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore-compat.js"></script>
    <script>
        firebase.initializeApp({ apiKey:"AIzaSyAuyKDI0JhPn-v02c5l7XekiyymNWeFPIQ", authDomain:"rafeeq2-c0aef.firebaseapp.com", projectId:"rafeeq2-c0aef", storageBucket:"rafeeq2-c0aef.firebasestorage.app", messagingSenderId:"1030537082006", appId:"1:1030537082006:web:7eb0a052da85e1441bfeb7" });
        window.auth=firebase.auth();window.db=firebase.firestore();window.googleProvider=new firebase.auth.GoogleAuthProvider();
    </script>
    <script src="js/i18n.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script>
    window.addEventListener('load',function(){setTimeout(function(){var s=document.getElementById('splash'),a=document.getElementById('app');if(s&&!s.classList.contains('hide')){s.classList.add('hide');setTimeout(function(){s.style.display='none';if(a)a.style.display='flex';},500);}},3000);
    var ni=document.getElementById('editName'),cc=document.getElementById('charCounter');if(ni&&cc){cc.textContent='0/25';ni.addEventListener('input',function(e){var v=this.value;if(v.length>25)this.value=v.slice(0,25);cc.textContent=this.value.length+'/25';});}
    document.getElementById('searchInput')?.addEventListener('keypress',function(e){if(e.key==='Enter')performSearch();});});
    window.performSearch=function(){if(typeof findUserById==='function')findUserById();};
    </script>
</body>
</html>
